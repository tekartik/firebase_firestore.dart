name: tekartik_firebase_firestore_sim
description: Firebase simulation
version: 0.8.0
publish_to: none

environment:
  sdk: ^3.12.0

dependencies:
  cv: ">=1.1.0+4"
  tekartik_firebase_sim:
    git:
      url: https://github.com/tekartik/firebase.dart
      path: firebase_sim
  tekartik_firebase_firestore:
    git:
      url: https://github.com/tekartik/firebase_firestore.dart
      path: firestore
    version: '>=0.8.0'
  meta: ">=1.18.0"
  synchronized: '>=1.5.0-dev.2'
  logging: any
  path: ">=1.9.1"
  json_rpc_2:
  tekartik_firebase_local:
    git:
      url: https://github.com/tekartik/firebase.dart
      path: firebase_local

  tekartik_firebase_firestore_sembast:
    git:
      url: https://github.com/tekartik/firebase_firestore.dart
      path: firestore_sembast
  tekartik_common_utils:
    git: https://github.com/tekartik/common_utils.dart
  tekartik_firebase:
    git:
      url: https://github.com/tekartik/firebase.dart
      path: firebase
  tekartik_web_socket_io:
    git:
      url: https://github.com/tekartik/web_socket.dart
      path: web_socket_io
dev_dependencies:
  tekartik_firebase_firestore_test:
    git:
      url: https://github.com/tekartik/firebase_firestore.dart
      path: firestore_test
  test: ">=1.31.0"
  dev_build: ">=1.1.7+3"
  build_runner: ">=2.15.0"
  build_web_compilers: ">=4.4.19"
  build_test: ">=0.10.3"
  process_run: ">=1.2.1+1"

resolution: workspace
